[build]
  publish = "."

[[redirects]]
  from = "/thank-you"
  to = "/thank-you.html"
  status = 200

[[redirects]]
  from = "/thank-you/"
  to = "/thank-you.html"
  status = 200

[[redirects]]
  from = "/contact.html"
  to = "/book/"
  status = 301

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
